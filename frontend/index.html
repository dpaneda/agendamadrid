<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Madrid - Eventos y actividades en Madrid hoy</title>
  <meta name="description" content="Agenda de eventos en Madrid actualizada a diario. Conciertos, exposiciones, teatro, talleres, visitas guiadas y mucho mas. Datos abiertos de datos.madrid.es, esmadrid.com y CentroCentro.">
  <meta property="og:title" content="Agenda Madrid - Eventos y actividades en Madrid hoy">
  <meta property="og:description" content="Agenda de eventos en Madrid actualizada a diario. Conciertos, exposiciones, teatro, talleres, visitas guiadas y mucho mas.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://agendamadrid.es/">
  <meta property="og:image" content="https://agendamadrid.es/images/agendamadrid.png">
  <link rel="icon" type="image/png" href="images/agendamadrid.png">
  <link rel="canonical" href="https://agendamadrid.es/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo"><span class="logo-agenda">agenda</span><span class="logo-madrid">madrid</span></a>
      <div class="date-nav">
        <button id="prev-day" aria-label="Dia anterior"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <button id="date-picker-btn" class="date-label">
          <span id="current-date"></span>
          <span id="event-count" class="event-count-badge"></span>
        </button>
        <button id="next-day" aria-label="Dia siguiente"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        <button id="btn-today" class="btn-today">Hoy</button>
        <input type="date" id="date-input" />
      </div>
      <nav class="header-nav">
        <button class="view-toggle active" data-view="list" id="btn-list">Lista</button>
        <button class="view-toggle" data-view="map" id="btn-map">Mapa</button>
        <button class="view-toggle" data-view="cal" id="btn-cal">Mes</button>
        <a href="/info.html" class="header-link">Info</a>
      </nav>
    </div>
  </header>

  <div class="filter-bar">
    <div class="filter-bar-inner">
      <select id="category-filter">
        <option value="">Todas las categorías</option>
      </select>
      <select id="source-filter">
        <option value="">Todas las fuentes</option>
      </select>
      <select id="sort-filter">
        <option value="hora">Ordenar por hora</option>
        <option value="precio">Ordenar por precio</option>
        <option value="distancia">Ordenar por distancia</option>
      </select>
      <div id="active-filters" class="active-filters"></div>
    </div>
  </div>

  <main>
    <div id="events-container"></div>
    <div id="map-container" hidden>
      <div id="map"></div>
    </div>
    <div id="cal-container" hidden></div>
  </main>

  <footer>
    <p>En algunos casos la programacion de ciertos eventos no se hace publica hasta pocos dias antes de que se celebren.</p>
    <p>Los eventos se actualizan con frecuencia. Consulta la fuente original para confirmar detalles.</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
  <script src="app.js"></script>
</body>
</html>
