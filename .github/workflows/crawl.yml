name: Crawl events

on:
  schedule:
    - cron: "0 6 * * *"  # 1 vez al dia
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r crawlers/requirements.txt

      - name: Run crawlers
        run: python crawlers/build_data.py

      - name: Enrich with LLM
        if: env.GEMINI_API_KEY != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m crawlers.enrich_source esmadrid

      - name: Download images
        run: python -m crawlers.download_images

      - name: Consolidate
        run: python -m crawlers.consolidate

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawlers/data/sources/ crawlers/data/enrich/
          git add frontend/data/ frontend/images/events/
          git add frontend/index.html frontend/sitemap.xml frontend/robots.txt
          git add frontend/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/index.html 2>/dev/null || true
          git add -u frontend/
          git diff --staged --quiet && exit 0
          git commit -m "Update events data"
          git pull --rebase
          git push
