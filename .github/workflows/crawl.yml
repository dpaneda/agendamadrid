name: Crawl events

on:
  schedule:
    - cron: "0 6 * * *"  # 1 vez al dia
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run crawlers
        run: python crawlers/build_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data/events.json frontend/data/calendar.json
          git diff --staged --quiet || git commit -m "Update events data"
          git pull --rebase
          git push
