name: Crawl events

on:
  schedule:
    - cron: "0 6 * * *"  # 1 vez al dia
  workflow_dispatch:  # manual trigger
    inputs:
      force_enrich:
        description: "Re-enrich all events with the LLM (ignore cache)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt

      - name: Install dependencies
        run: pip install -r crawlers/requirements.txt

      - name: Run crawlers
        run: python crawlers/build_data.py

      - name: Enrich with LLM
        if: env.GEMINI_API_KEY != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # force_enrich only re-enriches madrid_agenda (batch, cheap). Forcing
          # esmadrid would re-download ~1200 HTML pages and blow the timeout/quota.
          FORCE=""
          if [ "${{ inputs.force_enrich }}" = "true" ]; then FORCE="--force"; fi
          python -m crawlers.enrich_source esmadrid
          python -m crawlers.enrich_source madrid_agenda --batch $FORCE

      - name: Download images
        run: python -m crawlers.download_images

      - name: Consolidate
        run: python -m crawlers.consolidate

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawlers/data/sources/ crawlers/data/enrich/
          git add frontend/data/ frontend/images/events/
          git add frontend/index.html frontend/sitemap.xml frontend/robots.txt
          git add frontend/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/index.html 2>/dev/null || true
          git add -u frontend/
          git diff --staged --quiet && exit 0
          git commit -m "Update events data"
          git pull --rebase
          git push
